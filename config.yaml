data:
  raw_path: data/wshg_loan_data.csv
  processed_path: data/processed/wshg_processed.csv

preprocessing:
  cat_impute_cols:
    - Married
    - Dependents
    - Self_Employed
    - Credit_History
  num_impute_cols:
    - LoanAmount
  encode_cols:
    - Married
    - Education
    - Self_Employed
    - Property_Area
  target: Loan_Status
  drop_cols:
    - Loan_ID
    - Group_ID
    - Gender

model:
  test_size: 0.2
  random_state: 42
  logistic_regression:
    max_iter: 1000
  decision_tree:
    max_depth: 5
  random_forest:
    n_estimators: 200
    max_depth: 10
  svm:
    kernel: rbf
    C: 1.0

grid_search:
  cv: 5
  logistic_regression:
    C: [0.01, 0.1, 1, 10]
    solver: [lbfgs, liblinear]
    max_iter: [500, 1000]
  decision_tree:
    max_depth: [3, 5, 10, 15]
    min_samples_split: [2, 5, 10]
    criterion: [gini, entropy]
  random_forest:
    n_estimators: [100, 200]
    max_depth: [5, 10, 15]
    min_samples_split: [2, 5]
  svm:
    C: [0.1, 1, 10]
    kernel: [rbf, linear]
    gamma: [scale, auto]

output:
  model_path: models/wshg_best_model.joblib
  encoder_path: models/label_encoders.joblib
  scaler_path: models/scaler.joblib
  figures_path: reports/figures/
  log_path: logs/training.log